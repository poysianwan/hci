<!DOCTYPE html>
<html class="light" lang="en">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>PLP ClinicConnect - Role Selection</title>
    <!-- Fonts: Manrope for headlines, Inter for body/labels -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@700;800&display=swap"
        rel="stylesheet" />
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "inverse-on-surface": "#f0f1f2",
                        "on-error": "#ffffff",
                        "surface-tint": "#005db6",
                        "on-primary-fixed-variant": "#00468c",
                        "surface-variant": "#e1e3e4",
                        "on-primary": "#ffffff",
                        "surface-dim": "#d9dadb",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary": "#ffffff",
                        "primary-fixed": "#d6e3ff",
                        "inverse-primary": "#a9c7ff",
                        "tertiary-container": "#9f4300",
                        "tertiary-fixed-dim": "#ffb691",
                        "secondary-container": "#cbe7f5",
                        "tertiary-fixed": "#ffdbcb",
                        "tertiary": "#793100",
                        "inverse-surface": "#2e3132",
                        "on-tertiary-fixed-variant": "#793100",
                        "on-surface": "#191c1d",
                        "primary": "#00478d",
                        "secondary-fixed-dim": "#afcbd8",
                        "on-primary-fixed": "#001b3d",
                        "on-secondary-container": "#4e6874",
                        "on-tertiary-fixed": "#341100",
                        "primary-fixed-dim": "#a9c7ff",
                        "on-surface-variant": "#424752",
                        "on-tertiary-container": "#ffcfb9",
                        "secondary-fixed": "#cbe7f5",
                        "surface-container-low": "#f3f4f5",
                        "error-container": "#ffdad6",
                        "primary-container": "#005eb8",
                        "background": "#f8f9fa",
                        "on-background": "#191c1d",
                        "on-secondary": "#ffffff",
                        "outline": "#727783",
                        "on-secondary-fixed-variant": "#304a55",
                        "on-primary-container": "#c8daff",
                        "surface": "#f8f9fa",
                        "error": "#ba1a1a",
                        "surface-container-high": "#e7e8e9",
                        "on-secondary-fixed": "#021f29",
                        "on-error-container": "#93000a",
                        "surface-container": "#edeeef",
                        "outline-variant": "#c2c6d4",
                        "surface-bright": "#f8f9fa",
                        "surface-container-highest": "#e1e3e4",
                        "secondary": "#48626e"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Inter", "sans-serif"]
                    }
                },
            }
        }
    </script>
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .cloud-shadow {
            box-shadow: 0px 20px 40px rgba(25, 28, 29, 0.06);
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>

<body class="bg-surface font-body text-on-surface h-screen flex flex-col overflow-hidden">
    <!-- Console Header -->
    <header class="w-full px-8 py-6 shrink-0 flex justify-between items-center bg-transparent relative z-10">
        <div class="flex items-center gap-2.5">
            <div class="w-7 h-7 bg-primary text-white rounded-md flex items-center justify-center">
                <span class="material-symbols-outlined text-[16px] font-bold"
                    data-icon="clinical_notes">clinical_notes</span>
            </div>
            <span class="font-headline font-extrabold text-sm tracking-tight text-[#1c2a59]">PLP Clinic<span
                    class="text-[#004d9c]">Connect</span></span>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center p-6">
        <div class="max-w-4xl w-full flex flex-col items-center">

            <!-- Branding Hub - Integrated Style -->
            <div
                class="bg-white rounded-[3.5rem] p-10 md:p-14 cloud-shadow border border-outline-variant/10 w-full relative overflow-hidden text-center flex flex-col items-center">
                <!-- Branding Decoration -->
                <div class="absolute top-0 right-0 -mr-20 -mt-20 w-80 h-80 bg-blue-500/5 rounded-full blur-[100px]">
                </div>

                <div class="relative mb-10 w-full text-center">
                    <h1 class="font-headline font-extrabold text-5xl md:text-6xl tracking-tighter text-[#1c2a59] mb-4">
                        PLP Clinic<span class="text-[#004d9c]">Connect</span>
                    </h1>
                    <p class="text-slate-500 font-medium text-base md:text-lg tracking-tight mx-auto opacity-70">
                        Select your access point to begin clinic<br>session
                    </p>
                </div>

                <!-- Vertical Selection Bar Hub -->
                <div class="w-full max-w-2xl space-y-4">
                    <!-- High-Visibility Visitor Option -->
                    <button onclick="window.location.href='screen2-visitor-form.html'"
                        class="group relative w-full p-6 bg-surface-container-low rounded-3xl border border-outline-variant/20 hover:border-primary/30 transition-all duration-300 flex items-center gap-6 hover:shadow-2xl hover:shadow-primary/10 active:scale-[0.98]">
                        <div
                            class="w-16 h-16 rounded-2xl bg-primary text-white flex items-center justify-center shadow-lg shadow-primary/20 transition-transform group-hover:scale-110">
                            <span class="material-symbols-outlined text-4xl"
                                data-icon="person_search">person_search</span>
                        </div>
                        <div class="text-left flex-grow">
                            <h2 class="font-headline text-2xl font-bold text-on-surface mb-0.5">Visitor / Patient
                                Registration
                            </h2>
                            <p class="text-slate-500 text-xs font-medium tracking-tight">Record your arrival for
                                assessment and treatment</p>
                        </div>
                        <div
                            class="w-10 h-10 rounded-full bg-white flex items-center justify-center shadow-sm group-hover:bg-primary group-hover:text-white transition-colors">
                            <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
                        </div>
                    </button>

                    <!-- High-Visibility Staff Option -->
                    <button onclick="window.location.href='screen4-staff-login.html'"
                        class="group relative w-full p-6 bg-white rounded-3xl border border-outline-variant/20 hover:border-primary/30 transition-all duration-300 flex items-center gap-6 hover:shadow-2xl hover:shadow-primary/5 active:scale-[0.98]">
                        <div
                            class="w-16 h-16 rounded-2xl bg-white border border-outline-variant/30 text-primary flex items-center justify-center transition-transform group-hover:scale-110">
                            <span class="material-symbols-outlined text-4xl"
                                data-icon="medical_services">medical_services</span>
                        </div>
                        <div class="text-left flex-grow">
                            <h2 class="font-headline text-2xl font-bold text-on-surface mb-0.5">Clinic Staff Portal</h2>
                            <p class="text-slate-500 text-xs font-medium tracking-tight">Authorized access to logs and
                                patient records</p>
                        </div>
                        <div
                            class="w-10 h-10 rounded-full bg-slate-50 text-slate-400 flex items-center justify-center group-hover:bg-primary group-hover:text-white transition-colors">
                            <span class="material-symbols-outlined" data-icon="lock">lock</span>
                        </div>
                    </button>
                </div>

                <!-- Status Summary -->
                <div class="mt-12 flex items-center gap-8 justify-center">
                    <div class="flex items-center gap-2">
                        <span class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></span>
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Server Live</span>
                    </div>
                    <div class="w-px h-3 bg-slate-200"></div>
                    <div class="flex items-center gap-2">
                        <span class="material-symbols-outlined text-slate-300 text-[14px]"
                            data-icon="public">public</span>
                        <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">PLP Campus
                            Network</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Console Footer -->
    <footer class="w-full py-6 px-12 shrink-0 bg-transparent relative z-10">
        <div class="flex justify-between items-center text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em]">
            <span>© 2026 Powered by PLPCLINIC</span>
            <div class="flex gap-8">
                <a href="#" class="hover:text-primary transition-colors">Privacy</a>
                <a href="#" class="hover:text-primary transition-colors">Terms</a>
                <a href="#" class="hover:text-primary transition-colors">Supprt</a>
            </div>
        </div>
    </footer>

    <!-- Background Decoration -->
    <div class="fixed top-0 left-0 w-full h-full pointer-events-none -z-10 overflow-hidden opacity-40">
        <div class="absolute top-[-5%] left-[-5%] w-[30%] h-[30%] bg-blue-100 rounded-full blur-[100px]"></div>
        <div class="absolute bottom-[-5%] right-[-5%] w-[40%] h-[40%] bg-blue-50 rounded-full blur-[120px]"></div>
    </div>
</body>

</html>
